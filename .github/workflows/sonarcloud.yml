name: Flutter SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Analyze Flutter Project
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart-library-companion  # <-- Your Flutter project folder

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'  # <-- Change to your Flutter version

      # 3️⃣ Install Flutter dependencies
      - name: Flutter pub get
        run: flutter pub get

      # 4️⃣ Run SonarCloud scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2.2.1
        with:
          organization: ${{ secrets.SONAR_ORGANIZATION }}
          token: ${{ secrets.SONAR_TOKEN }}
          projectKey: your_project_key
          projectName: your_project_name

      # 5️⃣ (Optional) Run Flutter analyze
      - name: Flutter Analyze
        run: flutter analyze
