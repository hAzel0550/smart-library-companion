name: "SonarCloud Analysis for Flutter"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart-library-companion  # <-- Set your Flutter project folder

    steps:
      # 1. Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up JDK 17 (required by SonarCloud)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache SonarCloud dependencies
      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      # 4. Install Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.6'
          architecture: 'x64'

      # 5. Install Dart/Flutter dependencies
      - name: Install dependencies
        run: flutter pub get

      # 6. Optional: Run Flutter analyze to catch errors before SonarCloud
      - name: Flutter Analyze
        run: flutter analyze

      # 7. Optional: Flutter build (ensures everything compiles)
      - name: Flutter Build
        run: flutter build apk --debug

      # 8. Run SonarCloud analysis
      - name: Run SonarCloud Scanner
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
          extraProperties: |
            # Project identification
            sonar.projectKey=YOUR_PROJECT_KEY
            sonar.organization=YOUR_ORG_KEY

            # Sources and exclusions
            sonar.sources=lib
            sonar.exclusions=**/build/**, **/*.g.dart

            # Skip C/C++/Objective-C files
            sonar.c.file.suffixes=-
            sonar.cpp.file.suffixes=-
            sonar.objc.file.suffixes=-
