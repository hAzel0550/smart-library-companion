name: "SonarCloud Analysis for Flutter"

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend  # <-- Your Flutter project folder

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up JDK 17 (required by SonarCloud)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Cache SonarCloud packages
      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      # 4️⃣ Install Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'

      # 5️⃣ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 6️⃣ Optional: Analyze code
      - name: Flutter Analyze
        run: flutter analyze

      # 7️⃣ Optional: Build project
      - name: Flutter Build
        run: flutter build apk --debug

      # 8️⃣ Run SonarCloud analysis
      - name: Run SonarCloud Scanner
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # <-- Must be set in repo secrets
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=YOUR_PROJECT_KEY
            -Dsonar.organization=YOUR_ORG_KEY
            -Dsonar.sources=lib
            -Dsonar.exclusions=**/build/**, **/*.g.dart
            -Dsonar.c.file.suffixes=-
            -Dsonar.cpp.file.suffixes=-
            -Dsonar.objc.file.suffixes=-
